name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r cli/requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile cli/main.py
          python -m py_compile cli/api_handler.py
          python -m py_compile cli/aws_handler.py
          python -m py_compile cli/ai_handler.py
          python -m py_compile lambda/lambda_function.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Build Docker image
        run: docker build -t ip-spectre-app -f docker/Dockerfile .